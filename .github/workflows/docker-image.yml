name: Manual Build to GHCR

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: '镜像全名 (例如: ghcr.io/你的用户名/gost)'
        required: true
        default: 'ghcr.io/yourname/gost'
      tag:
        description: '镜像标签'
        required: true
        default: 'latest'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ inputs.image_name }}:${{ inputs.tag }}
