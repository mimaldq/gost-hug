name: Manual Build to GHCR

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: '镜像名 (例如: gost)'
        required: true
        default: 'gost'
      tag:
        description: '镜像标签 (例如: latest, v1.0)'
        required: true
        default: 'latest'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set full image name
        run: |
          # 将 GitHub 用户名转为小写（GHCR 要求小写）
          LOWERCASE_USER=$(echo "${{ github.actor }}" | tr '[:upper:]' '[:lower:]')
          echo "FULL_IMAGE=ghcr.io/${LOWERCASE_USER}/${{ inputs.repo_name }}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.FULL_IMAGE }}:${{ inputs.tag }}
