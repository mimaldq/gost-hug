name: Manual Build and Push GOST Docker Image

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Docker 镜像名称 (例如: yourname/gost)'
        required: true
        default: 'your-dockerhub-username/gost'
      tag:
        description: '镜像标签'
        required: false
        default: 'latest'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ github.event.inputs.image_name }}:${{ github.event.inputs.tag }}
